version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: pedido-postgres
    restart: always
    environment:
      POSTGRES_DB: pedido_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: